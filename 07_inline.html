<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inline elements</title>
</head>

<body>
    <i>this is italic text</i>

    <br />

    <b>this is bold</b>

    <br />

    <em>this is emphasize</em>

    <br />

    <strong> this is strong text</strong>

    <!-- sub -->

    <p>h <sub>2</sub>o</p>

    <!-- sup -->

    <p>a <sup>2</sup> b <sup>2</sup></p>
</body>

</html>
