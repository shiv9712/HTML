<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forms</title>
</head>

<body>
    <h1>forms</h1>

    <form action="">
        <label for="name">name</label>
        <input type="text" placeholder="enter your name" name="name" id="name" />

        <br />

        <input type="button" />
        <br />
        <br />
        <input type="color" />
        <br />
        <br />
        <input type="tel" />
        <br />
        <br />
        <input type="date" />
        <br />
        <br />
        <input type="email" placeholder="email" />
        <br />
        <br />

        <input type="range" />

        <br />
        <br />

        <label for="">result</label>

        <input type="radio" id="result" value="pass" name="result" /> pass
        <input type="radio" id="result" value="fail" name="result" />fail

        <br />
        <br />

        <label for="">country</label>

        <select name="" id="" name="country">
            <option value="india" selected>india</option>
            <option value="usa">usa</option>
            <option value="china">china</option>
        </select>

        <br />
        <br />

        <input type="button" />
        <input type="checkbox" />
        <input type="color" />
        <input type="date" />
        <input type="datetime-local" />
        <input type="email" />
        <input type="file" />
        <input type="hidden" />
        <input type="image" />
        <input type="month" />
        <input type="number" />
        <input type="password" />
        <input type="radio" />
        <input type="range" />
        <input type="reset" />
        <input type="search" />
        <input type="submit" />
        <input type="tel" />
        <input type="text" /> (default value)
        <input type="time" />
        <input type="url" />
        <input type="week" />

        <textarea name="" id="" rows="20" cols="20" placeholder="enter your address"></textarea>
    </form>
</body>

</html>
