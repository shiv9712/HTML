<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tag, elements and attributes</title>
</head>

<body>
    <!-- tag -->

    <p></p>

    <h1></h1>

    <!-- elements -->

    <h1>this is heading 1</h1>

    <h5 style="color: rgb(12, 207, 135)">this is heading 5</h5>

    <!-- attributes -->

    <ol type="1" start="24">
        <li>list-1</li>
        <li>list-2</li>
        <li>list-3</li>
    </ol>

    <p>this is paragraph</p>

    <p style="color: rgb(146, 127, 255)">this is another para</p>
</body>

</html>
